name: CI / Deploy

# Test on every push/PR. Build the image, push it to GHCR, and deploy to the
# Hetzner VM only on push to main (or a manual run). See docs/DEPLOYMENT.md §18.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

# Never let two production deploys overlap.
concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  IMAGE: ghcr.io/dor28/avvalo      # GHCR is case-sensitive & lowercase-only

jobs:
  # ── 1. Gate: nothing ships unless tests pass ────────────────────────────────
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: requirements-dev.lock
      - run: pip install --require-hashes -r requirements-dev.lock
      - run: pip install --no-deps --no-build-isolation -e .
      - name: Lint
        run: ruff check .
      - name: Security lint
        run: ruff check app --select S --ignore S101,S104,S105,S310
      - name: Tests
        run: pytest -q                     # the hard gate (in-memory SQLite, no services)

  # ── 2. Build the image once, push to GHCR ───────────────────────────────────
  build-and-push:
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_tag: ${{ steps.tag.outputs.value }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f # v3
      - name: Log in to GHCR
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9 # v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Compute immutable tag
        id: tag
        run: echo "value=sha-${GITHUB_SHA:0:12}" >> "$GITHUB_OUTPUT"
      - name: Build and push
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8 # v6
        with:
          context: .
          push: true
          tags: |
            ${{ env.IMAGE }}:latest
            ${{ env.IMAGE }}:${{ steps.tag.outputs.value }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── 3. Deploy: sync config, pull the new image, restart ─────────────────────
  deploy:
    needs: build-and-push
    if: github.event_name != 'pull_request'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - name: Deploy over SSH
        env:
          IMAGE_TAG: ${{ needs.build-and-push.outputs.image_tag }}
          SSH_HOST: ${{ secrets.DEPLOY_HOST }}
          SSH_HOST_KEY: ${{ secrets.DEPLOY_HOST_KEY }}
          SSH_KEY: ${{ secrets.DEPLOY_SSH_KEY }}
          SSH_PORT: ${{ secrets.DEPLOY_PORT }}
          SSH_USER: ${{ secrets.DEPLOY_USER }}
        run: |
          set -euo pipefail
          : "${SSH_HOST:?missing DEPLOY_HOST secret}"
          : "${SSH_HOST_KEY:?missing DEPLOY_HOST_KEY secret}"
          : "${SSH_KEY:?missing DEPLOY_SSH_KEY secret}"
          : "${SSH_PORT:?missing DEPLOY_PORT secret}"
          : "${SSH_USER:?missing DEPLOY_USER secret}"
          mkdir -p ~/.ssh
          printf '%s\n' "$SSH_KEY" > ~/.ssh/id_deploy
          printf '%s\n' "$SSH_HOST_KEY" > ~/.ssh/known_hosts
          chmod 600 ~/.ssh/id_deploy
          chmod 600 ~/.ssh/known_hosts

          # Sync repo config to the server. The image is pulled from GHCR, so the
          # app source on the box is inert — but compose / nginx / deploy scripts
          # must stay current. .env and secrets/ are excluded so server secrets
          # are never touched or deleted.
          rsync -az --delete \
            --exclude='.git' --exclude='.env' --exclude='secrets/' \
            --exclude='__pycache__/' --exclude='.github/' \
            -e "ssh -i ~/.ssh/id_deploy -p $SSH_PORT" \
            ./ "$SSH_USER@$SSH_HOST:avvalo/"

          # Pin the tag, pull, and restart on the server.
          ssh -i ~/.ssh/id_deploy -p "$SSH_PORT" "$SSH_USER@$SSH_HOST" \
            "bash ~/avvalo/deploy/remote-update.sh '$IMAGE_TAG'"
