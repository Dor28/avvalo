# Avvalo — production stack for a single Hetzner VM.
#
#   docker compose -f docker-compose.prod.yml up -d --build
#
# This is a SELF-CONTAINED production file (use it INSTEAD of docker-compose.yml,
# not layered on top of it). It hardens every service, keeps PostgreSQL off the
# public network, puts the database on a resizable Hetzner Volume, and adds nginx
# (with certbot for Let's Encrypt TLS) as the reverse proxy for the web channel.
#
# All secrets and host-specific values come from a `.env` file in this directory.
# Start from deploy/env.prod.example. See docs/DEPLOYMENT.md for the full guide.

services:
  db:
    image: postgres:16-alpine@sha256:57c72fd2a128e416c7fcc499958864df5301e940bca0a56f58fddf30ffc07777
    # NOTE: no `ports:` — PostgreSQL is reachable only on the internal compose
    # network as host `db`. It is never exposed to the VM's public interface.
    environment:
      POSTGRES_DB: avvalo
      POSTGRES_USER: avvalo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env}
      # Force SCRAM-SHA-256 for password auth (stronger than md5).
      POSTGRES_INITDB_ARGS: "--auth-host=scram-sha-256 --auth-local=scram-sha-256"
    command:
      - "postgres"
      # Conservative defaults for a small VM. Raise as you scale up (see the
      # "Scaling the database" section of docs/DEPLOYMENT.md).
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=256MB"
      - "-c"
      - "effective_cache_size=768MB"
      - "-c"
      - "work_mem=8MB"
      - "-c"
      - "maintenance_work_mem=128MB"
      # Keep enough WAL around to support replication / future PITR.
      - "-c"
      - "wal_level=replica"
      - "-c"
      - "max_wal_size=1GB"
    volumes:
      # Database lives on the Hetzner Volume mounted at /mnt/avvalo-data so it can
      # be resized and snapshotted independently of the VM's boot disk.
      - /mnt/avvalo-data/pg:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avvalo -d avvalo"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s
    restart: unless-stopped
    stop_grace_period: 30s
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  app:
    # Image is built and pushed to GHCR by .github/workflows/deploy.yml.
    # IMAGE_TAG is pinned in .env by deploy/remote-update.sh and is mandatory.
    # For a local build instead, use docker-compose.yml (dev) or add `build: .` back.
    image: ghcr.io/dor28/avvalo:${IMAGE_TAG:?set IMAGE_TAG in .env}
    depends_on:
      db:
        condition: service_healthy
    # Apply migrations (idempotent — Alembic tracks the version) then run the
    # bot(s) + web in one process. For a multi-instance deploy, run migrations as
    # a separate one-shot step instead (see docs/DEPLOYMENT.md "Scaling").
    command: ["sh", "-c", "alembic upgrade head && python -m app.main"]
    env_file:
      - .env
    # No published ports: nginx reaches the web app over the internal network as
    # http://app:8000. The Telegram bot uses outbound long-polling only.
    expose:
      - "8000"
    volumes:
      # Google Cloud Vision service-account key, mounted read-only. The path here
      # must equal GOOGLE_APPLICATION_CREDENTIALS in .env. Omit if OCR is unused.
      - ./secrets/gcv.json:/run/secrets/gcv.json:ro
    restart: unless-stopped
    stop_grace_period: 20s
    init: true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,nodev,size=256m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    deploy:
      resources:
        limits:
          # Tune to your VM. These suit a 4 vCPU / 8 GB box (Hetzner CX33) with room for db.
          cpus: "3"
          memory: 3072M
    healthcheck:
      # Requires WEB_ENABLED=true. For a bot-only deploy, delete this block.
      test: ["CMD-SHELL", "python -c \"import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/healthz', timeout=3).status==200 else 1)\""]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "5"

  nginx:
    image: nginx:1.27-alpine@sha256:65645c7bb6a0661892a8b03b89d0743208a18dd2f3f17a54ef4b76fb8e2f2a10
    depends_on:
      - app
    # The only ports open to the internet. UFW + Hetzner Cloud Firewall should
    # also restrict the host to 80/443 (+ your SSH port).
    ports:
      - "80:80"
      - "443:443"
    environment:
      AVVALO_DOMAIN: ${AVVALO_DOMAIN:?set AVVALO_DOMAIN in .env}
      # Substitute ONLY ${AVVALO_DOMAIN} in deploy/nginx/templates/*.template;
      # leave nginx's own runtime variables ($host, $remote_addr, …) intact.
      NGINX_ENVSUBST_FILTER: "^AVVALO_DOMAIN$$"
    # The custom shell command bypasses the official nginx entrypoint's template
    # hook, so render /etc/nginx/templates explicitly before starting nginx.
    # Then reload every 6h so renewed certificates are picked up without a
    # restart. `exec` keeps nginx as PID 1 for clean signal handling.
    command:
      - /bin/sh
      - -c
      - |
        set -eu
        /docker-entrypoint.d/20-envsubst-on-templates.sh
        rm -f /etc/nginx/conf.d/default.conf
        while :; do sleep 6h & wait $$!; nginx -s reload; done &
        exec nginx -g 'daemon off;'
    volumes:
      - ./deploy/nginx/templates:/etc/nginx/templates:ro
      - certbot_certs:/etc/letsencrypt:ro
      - certbot_www:/var/www/certbot:ro
    restart: unless-stopped
    security_opt:
      - no-new-privileges:true
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  certbot:
    image: certbot/certbot:latest@sha256:34ee91d2f43008eb78a007d22f23ed4b2eaa9a454cb27ca2c042b49527a695b4
    volumes:
      - certbot_certs:/etc/letsencrypt
      - certbot_www:/var/www/certbot
    # Try renewal twice a day (Let's Encrypt's recommendation); certbot only
    # acts when a cert is within 30 days of expiry. nginx reloads on its own
    # 6h timer above, so a renewed cert is served within hours. Bootstrap the
    # FIRST certificate with deploy/nginx/init-letsencrypt.sh.
    entrypoint:
      - /bin/sh
      - -c
      - "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  certbot_certs:
  certbot_www:
