services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: avvalo
      POSTGRES_USER: avvalo
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-avvalo}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U avvalo -d avvalo"]
      interval: 2s
      timeout: 3s
      retries: 15
    volumes:
      - pg:/var/lib/postgresql/data

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    # Apply the schema before booting; alembic tracks the version so this is
    # idempotent across restarts. Without it the first DB write hits "relation
    # ... does not exist" once a real bot token is configured.
    command: ["sh", "-c", "alembic upgrade head && python -m app.main"]
    environment:
      DATABASE_URL: postgresql+asyncpg://avvalo:${POSTGRES_PASSWORD:-avvalo}@db:5432/avvalo
      APP_HMAC_SECRET: ${APP_HMAC_SECRET:-development-only-hmac-secret-change-me}
      TELEGRAM_TOKEN: ${TELEGRAM_TOKEN:-development-placeholder}
      LLM_BASE_URL: ${LLM_BASE_URL:-http://ollama:11434/v1}
      LLM_API_KEY: ${LLM_API_KEY:-ollama}
      LLM_MODEL: ${LLM_MODEL:-qwen2.5:7b-instruct}
      LLM_FALLBACK_BASE_URL: ${LLM_FALLBACK_BASE_URL:-}
      LLM_FALLBACK_API_KEY: ${LLM_FALLBACK_API_KEY:-}
      LLM_FALLBACK_MODEL: ${LLM_FALLBACK_MODEL:-}
      OPERATOR_ALERT_CHAT_ID: ${OPERATOR_ALERT_CHAT_ID:-}
      OPERATOR_ALERT_DEBOUNCE_S: ${OPERATOR_ALERT_DEBOUNCE_S:-900}
      SENTRY_DSN: ${SENTRY_DSN:-}
      SENTRY_ENVIRONMENT: ${SENTRY_ENVIRONMENT:-development}
      WEB_SESSION_SECRET: ${WEB_SESSION_SECRET:-development-only-web-secret-change-me}
      WEB_ENABLED: ${WEB_ENABLED:-false}
      WEB_HOST: ${WEB_HOST:-0.0.0.0}
      WEB_PORT: ${WEB_PORT:-8000}
      WEB_DAILY_LIMIT: ${WEB_DAILY_LIMIT:-5}
      TURNSTILE_SITE_KEY: ${TURNSTILE_SITE_KEY:-}
      TURNSTILE_SECRET: ${TURNSTILE_SECRET:-}
    ports:
      - "${WEB_PORT:-8000}:${WEB_PORT:-8000}"
    restart: unless-stopped

  ollama:
    # Optional local LLM for dev: docker compose --profile local-llm up -d ollama
    # Then pull once: docker compose exec ollama ollama pull qwen2.5:7b-instruct
    image: ollama/ollama:latest
    profiles: ["local-llm"]
    ports:
      - "${OLLAMA_PORT:-11434}:11434"
    environment:
      OLLAMA_MAX_TRANSFER_STREAMS: "1"
    gpus: all
    volumes:
      - ollama_models:/root/.ollama
    restart: unless-stopped

volumes:
  pg:
  ollama_models:
