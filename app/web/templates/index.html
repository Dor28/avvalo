<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Avvalo</title>
    <link rel="stylesheet" href="/static/styles.css">
    {% if turnstile_site_key %}
      <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    {% endif %}
  </head>
  <body>
    <main class="shell">
      <section class="workspace" aria-labelledby="app-title">
        <div class="heading">
          <p class="kicker">Avvalo</p>
          <h1 id="app-title">Check Before You Commit</h1>
        </div>

        <form class="check-form" action="/check" method="post" enctype="multipart/form-data">
          <fieldset class="segmented">
            <legend>Mode</legend>
            {% for face_id, face in faces.items() %}
              <label>
                <input type="radio" name="face" value="{{ face_id }}" {% if face_id == "family_shield" %}checked{% endif %}>
                <span>{{ "Family Shield" if face_id == "family_shield" else "Seller Guard" }}</span>
              </label>
            {% endfor %}
          </fieldset>

          <label class="field">
            <span>Language</span>
            <select name="language">
              {% for language in languages %}
                <option value="{{ language }}" {% if language == default_language %}selected{% endif %}>{{ language_labels[language] }}</option>
              {% endfor %}
            </select>
          </label>

          <label class="field">
            <span>Message text</span>
            <textarea name="text" rows="8" maxlength="6000"></textarea>
          </label>

          <label class="field">
            <span>Caption</span>
            <input name="caption" type="text" maxlength="500">
          </label>

          <label class="field">
            <span>Image</span>
            <input name="image" type="file" accept="image/*">
          </label>

          {% if turnstile_site_key %}
            <div class="cf-turnstile" data-sitekey="{{ turnstile_site_key }}"></div>
          {% endif %}

          <label class="consent">
            <input type="checkbox" name="consent" value="yes">
            <span>{{ privacy_text }}</span>
          </label>

          <button type="submit">Check</button>
        </form>

        <section id="result" class="result" aria-live="polite"></section>
      </section>
    </main>
  </body>
</html>
