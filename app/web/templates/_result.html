{% if error %}
  <div class="result-block error">
    <strong>Could not check</strong>
    <p>{{ error }}</p>
  </div>
{% elif result %}
  <div class="result-block">
    <div class="result-meta">
      <span>{{ result.status.value }}</span>
      {% if result.latency_ms %}<span>{{ result.latency_ms }} ms</span>{% endif %}
      {% if result.cost_usd is not none %}<span>${{ "%.6f"|format(result.cost_usd) }}</span>{% endif %}
    </div>
    <pre>{{ result.text or "No response text." }}</pre>
  </div>
{% endif %}
