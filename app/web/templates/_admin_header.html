<header class="admin-topbar">
  <a class="admin-brand" href="/admin/posts?language={{ language }}">
    <img src="/static/icon-192.png?v={{ static_version }}" alt="">
    <span><strong>Avvalo</strong><small>Editorial</small></span>
  </a>
  <nav class="admin-section-nav" aria-label="{{ editorial.admin_title }}">
    <a class="{% if request.url.path.startswith('/admin/posts') %}active{% endif %}"
       href="/admin/posts?language={{ language }}">{{ editorial.admin_title }}</a>
    <a class="{% if request.url.path.startswith('/admin/rules') %}active{% endif %}"
       href="/admin/rules?language={{ language }}">{{ rules_nav_label }}</a>
    <a class="{% if request.url.path.startswith('/admin/cards') %}active{% endif %}"
       href="/admin/cards?language={{ language }}">{{ cards_nav_label }}</a>
  </nav>
  <div class="admin-topbar-actions">
    <nav class="language-nav" aria-label="{{ copy.language_label }}">
      {% for option in languages %}
        <a class="{% if option == language %}active{% endif %}"
           {% if option == language %}aria-current="page"{% endif %}
           aria-label="{{ language_labels[option] }}"
           href="{{ request.url.path }}?language={{ option }}">{{ short_language_labels[option] }}</a>
      {% endfor %}
    </nav>
    {% if show_logout %}
      <form action="/admin/logout" method="post">
        <input type="hidden" name="language" value="{{ language }}">
        <button class="admin-logout" type="submit">{{ editorial.admin_logout }}</button>
      </form>
    {% endif %}
  </div>
</header>
