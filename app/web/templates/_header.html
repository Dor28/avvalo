<header class="topbar">
  <a class="brand" href="/?language={{ language }}" aria-label="Avvalo">
    <span class="brand-mark" aria-hidden="true">
      <img src="/static/icon-192.png?v={{ static_version }}" alt="">
    </span>
    <span>Avvalo</span>
  </a>
  <nav class="product-nav" aria-label="{{ copy.product_label }}">
    <a class="{% if current_page == 'home' %}active{% endif %}" {% if current_page == 'home' %}aria-current="page"{% endif %} href="/?language={{ language }}">{{ copy.nav_home }}</a>
    <a class="{% if current_page == 'check' %}active{% endif %}" {% if current_page == 'check' %}aria-current="page"{% endif %} href="/check?language={{ language }}">{{ copy.nav_check }}</a>
    <a class="{% if current_page == 'scams' %}active{% endif %}" {% if current_page == 'scams' %}aria-current="page"{% endif %} href="/scams?language={{ language }}">{{ copy.nav_scams }}</a>
  </nav>
  <nav class="language-nav compact" aria-label="{{ copy.language_label }}">
    {% for option in languages %}
      <a class="{% if option == language %}active{% endif %}" {% if option == language %}aria-current="page"{% endif %} href="{{ language_path }}?language={{ option }}">{{ language_labels[option] }}</a>
    {% endfor %}
  </nav>
</header>
