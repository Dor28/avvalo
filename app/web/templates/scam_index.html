<!doctype html>
<html lang="{{ copy.html_lang }}">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#008aa8">
    <title>{{ copy.title }} | {{ copy.scams_title }}</title>
    {% for option in languages %}
      <link rel="alternate" hreflang="{{ hreflangs[option] }}" href="/scams?language={{ option }}">
    {% endfor %}
    <link rel="icon" href="/static/favicon.ico?v={{ static_version }}" sizes="any">
    <link rel="apple-touch-icon" href="/static/apple-touch-icon.png?v={{ static_version }}">
    <link rel="stylesheet" href="/static/styles.css?v={{ static_version }}">
  </head>
  <body>
    {% include "_header.html" %}

    <main class="content-shell">
      <section class="content-head" aria-labelledby="scams-title">
        <p class="eyebrow">Avvalo</p>
        <h1 id="scams-title">{{ copy.scams_title }}</h1>
      </section>

      {% if articles %}
        <section class="article-grid" aria-label="{{ copy.scams_title }}">
          {% for article in articles %}
            <article class="article-card">
              <h2>{{ article.title }}</h2>
              <p>{{ article.description }}</p>
              <a class="text-link" href="/scams/{{ article.slug }}?language={{ language }}">{{ copy.scams_open }}</a>
            </article>
          {% endfor %}
        </section>
      {% else %}
        <section class="empty-state">
          <p>{{ copy.scams_empty }}</p>
        </section>
      {% endif %}
    </main>
  </body>
</html>
